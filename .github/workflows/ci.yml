name: CI/CD & ML Validation Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    # Run automatically every Sunday at 00:00 UTC (Weekly health & regression check)
    - cron: '0 0 * * 0'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest httpx
          
      - name: Lint with flake8
        working-directory: ./backend
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          
      - name: Test with pytest
        working-directory: ./backend
        run: |
          pytest

  frontend-test:
    name: Frontend Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

  deploy-frontend:
    name: Build & Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    # Removed needs to unblock deployment
    # Only deploy on push to master (not on PRs or scheduled runs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: https://tony-ai-health-analysis-system.onrender.com
          VITE_GOOGLE_CLIENT_ID: 132721264540-a2794sbnqvens788p1tqe26asn0q1i9r.apps.googleusercontent.com
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist
          publish_branch: gh-pages
